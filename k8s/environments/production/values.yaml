replicaCount: 3

image:
  repository: ghcr.io/YOUR_ORG/bankingkata-api
  tag: "latest"

ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: bankingkata.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: bankingkata-tls
      hosts:
        - bankingkata.example.com

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

podDisruptionBudget:
  enabled: true
  minAvailable: 2

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "5000"
  prometheus.io/path: "/metrics"

env:
  - name: ASPNETCORE_ENVIRONMENT
    value: "Production"
