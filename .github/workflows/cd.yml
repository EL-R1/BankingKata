name: CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  DOTNET_VERSION: '8.0.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bankingkata-api

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      version: ${{ steps.env.outputs.version }}
      
    steps:
      - name: Validate environment
        id: env
        run: |
          ENV=${{ github.event.inputs.environment || 'staging' }}
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          
          if [ "$ENV" == "production" ] && [[ ! "${{ github.ref }}" =~ ^refs/tags/v[0-9]+ ]]; then
            echo "Production deployments must use version tags (e.g., v1.0.0)"
            exit 1
          fi
          
          VERSION=${{ github.event.inputs.environment && '0.0.0' || github.event.release.tag_name }}
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    permissions:
      contents: read
      packages: write
      
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ env.REGISTRY }}/${{ github.repository_owner }}/bankingkata-api:${{ needs.validate-inputs.outputs.version }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/bankingkata-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.validate-inputs.outputs.version }}
            BUILD_REF=${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [validate-inputs, build-and-push]
    if: needs.validate-inputs.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.bankingkata.example.com
    
    steps:
      - name: Deploy to Staging
        run: |
          echo "Deploying version ${{ needs.validate-inputs.outputs.version }} to staging"
          echo "Image: ${{ needs.build-and-push.outputs.image-tag }}"
          
          # Placeholder for actual deployment logic
          # Examples:
          # - kubectl apply -f k8s/ staging
          # - helm upgrade --install bankingkata staging -f values.staging.yaml
          # - terraform apply -var="environment=staging"
          
          echo "::notice title=Staging Deployment::Image ${{ needs.build-and-push.outputs.image-tag }} deployed"

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # curl -f https://staging.bankingkata.example.com/api/health || exit 1
          echo "Smoke tests passed"

      - name: Notify deployment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id,
              state: 'success',
              environment: 'staging',
              environment_url: 'https://staging.bankingkata.example.com'
            });

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate-inputs, build-and-push]
    if: needs.validate-inputs.outputs.environment == 'production'
    environment:
      name: production
      url: https://bankingkata.example.com
    
    steps:
      - name: Pre-deployment checks
        run: |
          echo "Pre-deployment checks for version ${{ needs.validate-inputs.outputs.version }}"
          
          # Verify it's a tagged release
          if [[ ! "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            echo "Production deployments must use version tags"
            exit 1
          fi
          
          echo "All pre-deployment checks passed"

      - name: Deploy to Production
        run: |
          echo "Deploying version ${{ needs.validate-inputs.outputs.version }} to production"
          echo "Image: ${{ needs.build-and-push.outputs.image-tag }}"
          
          # Placeholder for actual deployment logic
          echo "::notice title=Production Deployment::Image ${{ needs.build-and-push.outputs.image-tag }} deployed"

      - name: Run health checks
        run: |
          echo "Running production health checks..."
          # for i in {1..5}; do
          #   curl -f https://bankingkata.example.com/api/health && break
          #   sleep 5
          # done
          echo "Health checks completed"

      - name: Notify deployment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id,
              state: 'success',
              environment: 'production',
              environment_url: 'https://bankingkata.example.com'
            });

      - name: Create GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CHANGELOG.md
            **/*.nupkg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rollback:
    name: Rollback (on failure)
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: failure()
    environment:
      name: ${{ needs.deploy-staging.result && 'staging' || 'production' }}
    
    steps:
      - name: Rollback deployment
        run: |
          echo "::error title=Deployment Failed::Rolling back to previous version"
          # Placeholder for rollback logic
          # kubectl rollout undo deployment/bankingkata-api -n ${{ env.DEPLOYMENT_NAMESPACE }}
