version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: bankingkata-api:latest
    container_name: bankingkata-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - bankingkata-network

  # Swagger UI for development
  swagger:
    image: swaggerapi/swagger-ui:latest
    container_name: bankingkata-swagger
    ports:
      - "8080:8080"
    environment:
      - SWAGGER_JSON_URL=http://api:5000/swagger/v1/swagger.json
    depends_on:
      - api
    networks:
      - bankingkata-network

networks:
  bankingkata-network:
    driver: bridge
